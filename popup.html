<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      min-height: 120px;
      max-height: 500px;
      overflow-y: auto;
      background: #0f0f14;
      color: #d4d4d8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12.5px;
      line-height: 1.4;
    }
    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-track { background: transparent; }
    body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .header {
      position: sticky;
      top: 0;
      background: #0f0f14;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 1;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e4e4e7;
      letter-spacing: 0.01em;
    }
    .header h1 span { margin-right: 6px; }
    .clear-all {
      padding: 3px 8px;
      background: transparent;
      color: #71717a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .clear-all:hover { color: #f87171; border-color: rgba(239,68,68,0.3); }
    .cards { padding: 8px 12px 12px; }
    .empty {
      text-align: center;
      color: #52525b;
      padding: 36px 0;
      font-size: 12px;
    }
    .card {
      background: rgba(24, 24, 32, 0.8);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: rgba(255,255,255,0.1); }
    .card-topic {
      font-weight: 600;
      color: #e4e4e7;
      font-size: 12.5px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-goal {
      color: #a1a1aa;
      font-size: 11.5px;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-stats {
      display: flex;
      gap: 8px;
      font-size: 11px;
      color: #71717a;
      margin-bottom: 6px;
    }
    .card-stats span {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .stat-num { color: #a1a1aa; font-weight: 500; }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-time { font-size: 10.5px; color: #52525b; }
    .card-clear {
      padding: 2px 6px;
      background: transparent;
      color: #52525b;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 4px;
      font-size: 10.5px;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .card-clear:hover { color: #f87171; border-color: rgba(239,68,68,0.25); }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>&#x21C4;</span> DuperMemory</h1>
    <button class="clear-all" id="clear-all">Clear all</button>
  </div>
  <div class="cards" id="cards"></div>
  <script src="popup.js"></script>
</body>
</html>
